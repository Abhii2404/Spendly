version: '3.8'

services:
  spendly-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Future services to be added:
# transaction-service:
#   build: ../spendly-transaction-service
#   ports: ["3001:3001"]
#
# analytics-service:
#   build: ../spendly-analytics-service
#   ports: ["3002:3002"]

# Useful Docker commands:
# Build only:
#   docker-compose build
# Run in background:
#   docker-compose up -d
# View logs:
#   docker-compose logs -f spendly-web
# Stop and remove:
#   docker-compose down
# Rebuild from scratch:
#   docker-compose up --build --force-recreate
